[pytest]
testpaths = tests/python
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: requires DATABASE_URL and a live Supabase connection (run with --integration)
    supabase: requires NEXT_PUBLIC_SUPABASE_URL and key (REST API layer)
addopts = -v --tb=short
env_files =
    .env.local
    .env
