[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    external_api: marks tests as requiring network access to government APIs
    db: marks tests as requiring DATABASE_URL (Supabase Postgres)
    production: marks tests as requiring SITE_BASE_URL (live production site)
    slow: marks tests that are expected to be slow (>5s)

# Show slowest 10 tests
addopts = --tb=short -q

# Default timeout per test (seconds). Override per-test with @pytest.mark.timeout(N).
# Requires pytest-timeout if installed.
# timeout = 60

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
