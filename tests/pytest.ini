[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
timeout = 120
markers =
    external_api: tests that make real HTTP requests to external government APIs
    db: tests that require a live DATABASE_URL connection
    slow: tests that may take >10 seconds (large API payloads)
addopts = -v --tb=short
