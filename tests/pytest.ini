[pytest]
testpaths = tests/python
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    external_api: tests that call live government / third-party APIs (require network)
    database: tests that read from live Supabase (require NEXT_PUBLIC_SUPABASE_URL)
    slow: tests that are slow (>5 seconds)

# Output
addopts = -v --tb=short

# Min version
minversion = 7.4
