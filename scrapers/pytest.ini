[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    live_api: requires live external API access (CMS, CDSS, state portals)
    db: requires DATABASE_URL to be set pointing at a real Supabase instance
    slow: test takes > 10 seconds
    anthropic: requires ANTHROPIC_API_KEY

# Show full diff on assertion failures
addopts = -v --tb=short

asyncio_mode = auto
