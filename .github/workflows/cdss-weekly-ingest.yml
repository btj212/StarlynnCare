# Manual CDSS citation + inspection ingest (scheduled CA scan lives in
# weekly-inspection-ingest.yml so alerts share the state-scan ledger).
# Requires DATABASE_URL secret (Supabase Postgres connection string with write access).
name: CDSS weekly ingest

on:
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run ccld_citations_ingest (publishable facilities)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrapers/ccld_citations_ingest.py --publishable

      # Layer 5b — re-audit published hub content against the freshly ingested
      # data. Any city whose grounded numbers moved is flagged drift_detected,
      # which hides it from the public site until it's regenerated + re-approved.
      # Exits 0 even when drift is found (flagging is the success path).
      - name: Layer 5b — hub content drift audit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/validate/hub_content_drift_check.py --state CA
