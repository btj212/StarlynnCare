# Weekly CDSS citation + inspection ingest (California publishable facilities).
# Requires DATABASE_URL secret (Supabase Postgres connection string with write access).
name: CDSS weekly ingest

on:
  schedule:
    # Mondays 10:00 UTC (~2am Pacific during standard time)
    - cron: "0 10 * * 1"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run ccld_citations_ingest (publishable facilities)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrapers/ccld_citations_ingest.py --publishable
