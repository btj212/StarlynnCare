# Nightly inspection check + ingest for all COVERED_STATES (CA–PA).
# Complements cdss-weekly-ingest.yml (CA-only, Monday mornings).
#
# Matrix: one job per state so a slow OR/PA PDF pass cannot block MN/UT.
# Requires secrets: DATABASE_URL, ANTHROPIC_API_KEY (for PDF parse steps).
name: Weekly inspection ingest

on:
  schedule:
    # Daily 23:00 UTC — matches Cursor automation cron
    - cron: "0 23 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/weekly_inspection_ingest.py"
      - "scripts/probe_inspection_freshness.py"
      - ".github/workflows/weekly-inspection-ingest.yml"
  workflow_dispatch:
    inputs:
      state:
        description: "Single state code (optional, e.g. OR). Leave blank for all."
        required: false
        type: string
      skip_ca:
        description: "Skip CA ingest (use when cdss-weekly-ingest already ran today)"
        required: false
        type: boolean
        default: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      # Supabase session pooler is pool_size=15; even 3 parallel jobs exhaust it when
      # each state opens multiple connections (MN/IL/PA/UT failed 2026-06-25 run 28137781944).
      max-parallel: 1
      matrix:
        state: [MN, OR, IL, PA, UT, CA, TX, WA, AZ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run weekly inspection ingest (${{ matrix.state }})
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS=(--state "${{ matrix.state }}")
          SKIP_CA="${{ inputs.skip_ca }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            SKIP_CA="true"
          fi
          if [ "$SKIP_CA" = "true" ] && [ "${{ matrix.state }}" = "CA" ]; then
            ARGS+=(--skip-ca)
          fi
          # WA PDF pass takes ~2h and rarely changes; schedule handles it nightly.
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ matrix.state }}" = "WA" ]; then
            echo "Skipping WA on push-triggered ingest (schedule run covers WA)"
            exit 0
          fi
          if [ -n "${{ inputs.state }}" ] && [ "${{ inputs.state }}" != "${{ matrix.state }}" ]; then
            echo "Skipping ${{ matrix.state }} (workflow_dispatch targeted ${{ inputs.state }})"
            exit 0
          fi
          python3 scripts/weekly_inspection_ingest.py "${ARGS[@]}" --skip-validate

      - name: Layer 5 post-ingest — ${{ matrix.state }}
        if: success()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/validate/post_ingest_check.py --state ${{ matrix.state }} || true

  validate:
    needs: ingest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Layer 5b — hub content drift audit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/validate/hub_content_drift_check.py

      - name: Layer 3 — production smoke
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/validate/smoke_test.py --env production || true
